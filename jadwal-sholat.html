<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Sholat - Berkah</title>
    <style>
        /* Hasil pembersihan CSS FrontPage */
        body { font-family: Arial, Helvetica, sans-serif; background-color: #ffffff; margin: 0; padding: 10px; }
        
        .container-jadwal { width: 100%; max-width: 600px; margin: 0 auto; border: 1px solid #ddd; }
        
        /* Header Hijau Jadwal */
        .judul-kota { background-color: #00a86b; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 16px; }
        .bulan-info { background-color: #00d084; color: white; padding: 10px; text-align: center; font-size: 20px; font-weight: bold; }

        /* Styling Tabel Utama */
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #00a86b; color: white; padding: 10px 5px; font-size: 12px; border: 1px solid #008f5b; }
        td { padding: 8px 5px; text-align: center; border: 1px solid #eee; font-size: 13px; }
        
        /* Baris Selang-Seling */
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        /* Highlight Hari Ini (Sesuai tgl 11 di gambar Anda) */
        .hari-ini { background-color: #ffffcc; font-weight: bold; }

        .back-link { display: inline-block; margin-bottom: 10px; text-decoration: none; color: #00a86b; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← Kembali ke Utama</a>

    <div class="container-jadwal">
        <div class="judul-kota">Jadwal Sholat untuk Jakarta Pusat</div>
        <div class="bulan-info">April 2026</div>
        
        <table>
            <thead>
                <tr>
                    <th>Tanggal</th>
                    <th>Imsyak</th>
                    <th>Shubuh</th>
                    <th>Terbit</th>
                    <th>Dhuha</th>
                    <th>Dzuhur</th>
                    <th>Ashar</th>
                    <th>Maghrib</th>
                    <th>Isya</th>
                </tr>
            </thead>
            <tbody id="data-jadwal">
                </tbody>
        </table>
    </div>

    <script>
        // Simulasi data yang ditarik dari sistem (mirip aslinya)
        async function loadJadwal() {
            const res = await fetch('https://api.aladhan.com/v1/calendarByCity/2026/4?city=Jakarta&country=Indonesia&method=20');
            const result = await res.json();
            const data = result.data;
            const tglSekarang = new Date().getDate();
            
            let html = "";
            data.forEach(hari => {
                const tgl = parseInt(hari.date.gregorian.day);
                const isToday = tgl === tglSekarang ? "class='hari-ini'" : "";
                
                html += `<tr ${isToday}>
                    <td>${tgl < 10 ? '0'+tgl : tgl}</td>
                    <td>${hari.timings.Imsak.split(' ')[0]}</td>
                    <td>${hari.timings.Fajr.split(' ')[0]}</td>
                    <td>${hari.timings.Sunrise.split(' ')[0]}</td>
                    <td>${hari.timings.Maghrib.split(' ')[0]}</td> <td>${hari.timings.Dhuhr.split(' ')[0]}</td>
                    <td>${hari.timings.Asr.split(' ')[0]}</td>
                    <td>${hari.timings.Maghrib.split(' ')[0]}</td>
                    <td>${hari.timings.Isha.split(' ')[0]}</td>
                </tr>`;
            });
            document.getElementById('data-jadwal').innerHTML = html;
        }
        loadJadwal();
    </script>
</body>
</html>
